# EduLumix frontend on Netlify (backend stays on Render).
# Dashboard: Site settings → Build & deploy → set same values if not using this file.

[build]
  base = "frontend"
  command = "npm install && npm run build"
  # Relative to `base` (frontend/) after build → frontend/.next on disk
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

